<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WEMBA 52 Survival Dashboard</title>
<meta name="description" content="WEMBA 52 생존노트 — 마감·시험·과제 한눈에 보기" />
<!-- 검색엔진 노출 차단 (링크 아는 사람만 접근) -->
<meta name="robots" content="noindex, nofollow" />
<!-- 캐시 최소화 (업데이트가 빨리 반영되도록) -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<style>
  :root{
    /* 다크 (토글 시) — 대비 강화 */
    --bg:#121309; --panel:#21241c; --panel2:#2c3026; --line:#414636;
    --ink:#f4f3ec; --muted:#c0bfae; --faint:#8f8f7e;
    --accent:#caf23f; --hard:#ff7a6e; --ok:#8bd44f; --warn:#e6c235;
    --shadow:0 0 0 1px rgba(255,255,255,.04), 0 14px 30px rgba(0,0,0,.5);
    --r:18px;
    --grad:linear-gradient(115deg, #cdf23a 0%, #e6f24e 55%, #eff06a 100%);
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code","Roboto Mono",Consolas,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","PingFang SC","Microsoft YaHei","微软雅黑","Noto Sans KR","Noto Sans SC",sans-serif;
  }
  /* 라이트(깨끗한 화이트 + 라임 포인트) — 기본 디자인 */
  :root[data-theme="light"]{
    --bg:#f6f6f2; --panel:#ffffff; --panel2:#efefe8; --line:#e6e6dd;
    --ink:#16160f; --muted:#5b5b50; --faint:#9a9a8c;
    --accent:#bce62a; --hard:#e5484d; --ok:#5fa83a; --warn:#cc9a1f;
    --shadow:0 1px 2px rgba(20,20,10,.05), 0 12px 28px rgba(20,20,10,.07);
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme]){
      --bg:#f6f6f2; --panel:#ffffff; --panel2:#efefe8; --line:#e6e6dd;
      --ink:#16160f; --muted:#5b5b50; --faint:#9a9a8c;
      --accent:#bce62a; --hard:#e5484d; --ok:#5fa83a; --warn:#cc9a1f;
      --shadow:0 1px 2px rgba(20,20,10,.05), 0 12px 28px rgba(20,20,10,.07);
    }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  html,body{margin:0; touch-action:manipulation}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","PingFang SC","Microsoft YaHei","微软雅黑","Noto Sans KR","Noto Sans SC",Helvetica,Arial,sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1120px; margin:0 auto; padding:24px 20px 80px}
  a{color:var(--ink); text-underline-offset:2px}

  /* header */
  header.top{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:8px}
  .brand .wordmark{font-family:Georgia,"Times New Roman",serif; font-size:22px; font-weight:600; letter-spacing:.01em; color:var(--ink); line-height:1; margin-bottom:8px}
  .brand .wmark-img{height:26px; width:auto; display:block; margin-bottom:8px}
  .brand .kicker{font-size:12px; font-weight:700; letter-spacing:.14em; color:var(--muted); text-transform:uppercase}
  .brand h1{font-family:var(--mono); margin:.1em 0 .15em; font-size:clamp(26px,4.5vw,40px); letter-spacing:-.03em; line-height:1.05; font-weight:800}
  .brand .sub{color:var(--muted); font-size:14px}
  .brand .asof{color:var(--faint); font-size:12.5px; margin-top:2px}
  .brand .asof a{color:var(--muted); text-decoration:underline; text-underline-offset:2px; font-weight:700}

  .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .toggle{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px; box-shadow:var(--shadow)}
  .toggle button{border:0; background:transparent; color:var(--muted); font-weight:700; font-size:13px; padding:9px 14px; border-radius:999px; cursor:pointer; line-height:1; touch-action:manipulation; -webkit-tap-highlight-color:transparent; user-select:none}
  .toggle button.on{background:var(--ink); color:var(--bg)}
  .toggle.theme button{padding:9px 12px; font-size:15px}

  /* hero countdown — 라임 그라데이션 카드 */
  .hero{margin:18px 0 28px; background:var(--grad); color:#14140d; border-radius:24px; padding:26px 28px; box-shadow:var(--shadow); display:flex; align-items:center; gap:24px; flex-wrap:wrap}
  .hero > div:first-child{flex:1; min-width:200px}
  .hero .label{display:inline-block; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#14140d; background:rgba(0,0,0,.08); padding:4px 11px; border-radius:999px}
  .hero h2{font-family:var(--mono); margin:.55em 0 .22em; font-size:clamp(20px,3.4vw,30px); letter-spacing:-.02em; line-height:1.1; color:#14140d; font-weight:800}
  .hero .meta{font-size:13px; color:#14140d; opacity:.78}
  .hero .count{margin-left:auto; text-align:center; min-width:96px; padding:14px 20px; border-radius:18px; background:#14140d; color:#fff}
  .hero .count .num{font-family:var(--mono); font-size:clamp(28px,5.5vw,44px); font-weight:800; line-height:1; letter-spacing:-.02em; color:#fff}
  .hero .count .unit{margin-top:5px; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#fff; opacity:.72}
  /* 임박(D-2 이내)하면 카운트 배지 빨강 */
  .hero.urgent .count{background:var(--hard)}

  /* jump nav */
  .jump{position:sticky; top:0; z-index:30; display:flex; gap:7px; overflow-x:auto; padding:11px 20px;
    margin:8px -20px 0; background:color-mix(in srgb,var(--bg) 85%, transparent); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch}
  .jump::-webkit-scrollbar{height:0}
  .jump a{flex:0 0 auto; font-size:12.5px; font-weight:700; color:var(--muted); text-decoration:none;
    padding:7px 13px; border:1px solid var(--line); border-radius:999px; background:var(--panel); white-space:nowrap; transition:.15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent}
  .jump a:hover{color:var(--ink); border-color:var(--accent)}
  .jump a.cur{color:var(--bg); background:var(--ink); border-color:var(--ink)}

  /* section */
  section{margin:34px 0; scroll-margin-top:72px}
  .h{display:flex; align-items:baseline; gap:10px; margin:0 0 14px}
  .h h3{font-family:var(--mono); margin:0; font-size:18px; letter-spacing:-.01em; font-weight:800}
  .h .hint{color:var(--faint); font-size:12.5px}

  /* grid helpers */
  .grid{display:grid; gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g4{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  @media(max-width:720px){ .g2{grid-template-columns:1fr} }

  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:18px; box-shadow:var(--shadow)}

  /* deadlines list */
  .dl{display:flex; flex-direction:column; gap:8px}
  .month-sep{display:flex; align-items:center; gap:12px; margin:14px 2px 4px; color:var(--faint); font-size:12px; font-weight:800; letter-spacing:.12em; text-transform:uppercase}
  .month-sep::after{content:""; flex:1; height:1px; background:var(--line)}
  .month-sep:first-child{margin-top:0}
  .row{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:var(--shadow)}
  .row.past{opacity:.42}
  .dd{flex:0 0 64px; text-align:center}
  .dd .big{font-family:var(--mono); font-size:19px; font-weight:800; line-height:1}
  .dd .sm{font-size:10.5px; color:var(--faint); font-weight:700; letter-spacing:.1em; text-transform:uppercase}
  .dd.urgent .big{color:var(--hard)} .dd.soon .big{color:var(--warn)}
  .row .body{flex:1; min-width:0}
  .row .ttl{font-weight:700; font-size:15px}
  .row .det{color:var(--muted); font-size:13px; margin-top:1px}
  .row .when{color:var(--faint); font-size:12px; margin-top:2px}
  .pill{flex:0 0 auto; font-size:11px; font-weight:800; letter-spacing:.06em; padding:4px 9px; border-radius:999px; text-transform:uppercase}
  .tag{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:6px; letter-spacing:.04em; color:#06121f}

  /* course cards */
  .course .top{display:flex; align-items:center; gap:10px; margin-bottom:6px}
  .course .dot{width:10px;height:10px;border-radius:50%}
  .course .code{font-family:var(--mono); font-weight:800; letter-spacing:.02em}
  .course .nm{color:var(--muted); font-size:12.5px}
  .course .head{font-weight:700; margin:8px 0 10px; font-size:14.5px}
  .course ul{margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:7px}
  .course li{font-size:13px; color:var(--ink); padding-left:16px; position:relative}
  .course li::before{content:""; position:absolute; left:2px; top:8px; width:5px;height:5px;border-radius:50%; background:var(--faint)}
  .course .traps{margin-top:12px; border-top:1px dashed var(--line); padding-top:10px}
  .course .traps .lab{font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--hard); margin-bottom:6px}
  .course .traps li::before{background:var(--hard)}

  /* block week */
  .bw{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  @media(max-width:720px){ .bw{grid-template-columns:1fr} }
  .opt{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:16px}
  .opt .code{font-family:var(--mono); font-weight:800; color:var(--ink)}
  .opt .t{font-weight:700; margin:2px 0}
  .opt .p{color:var(--faint); font-size:12px; margin-bottom:6px}
  .opt .d{font-size:13px; color:var(--muted)}
  .bw-note{grid-column:1/-1; color:var(--muted); font-size:12.5px}

  /* checklist — 상태 행 스타일 */
  .srow{display:flex; align-items:center; gap:14px; width:100%; padding:13px 2px; border:0; border-bottom:1px solid var(--line); background:transparent; font:inherit; color:inherit; text-align:left; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; -webkit-appearance:none; appearance:none}
  .srow:last-child{border-bottom:0}
  .srow .stext{flex:1; min-width:0}
  .srow .stitle{font-size:14px; font-weight:600; color:var(--ink)}
  .srow.done .stitle{text-decoration:line-through; color:var(--faint)}
  .srow .sstat{font-size:12px; margin-top:3px; font-weight:700; color:var(--faint)}
  .srow.done .sstat{color:var(--ok)}
  .srow.over .sstat{color:var(--hard)}
  .scircle{flex:0 0 auto; width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:15px; font-weight:800; border:2px solid var(--line); color:transparent; transition:.15s}
  .srow.done .scircle{background:var(--ok); border-color:var(--ok); color:#fff}
  .srow.over .scircle{background:var(--hard); border-color:var(--hard); color:#fff}
  .progress{height:6px; background:var(--line); border-radius:999px; overflow:hidden; margin:4px 0 14px}
  .progress > i{display:block; height:100%; background:var(--ok); width:0; transition:width .3s}

  /* social / dinner */
  .social-top{display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center}
  .social-top .d{font-size:13px; color:var(--muted); flex:1; min-width:220px}
  .cta{display:inline-flex; align-items:center; gap:7px; background:var(--ink); color:var(--bg); font-weight:800; font-size:13.5px; padding:11px 20px; border-radius:999px; text-decoration:none; white-space:nowrap}
  .social-frame{width:100%; height:560px; border:1px solid var(--line); border-radius:12px; margin-top:14px; background:var(--panel2)}
  .social-cap{color:var(--faint); font-size:11.5px; margin-top:6px}

  /* schedule */
  .sched{width:100%; border-collapse:collapse; font-size:13px; min-width:460px}
  .sched th,.sched td{padding:9px 11px; border-bottom:1px solid var(--line); vertical-align:top; text-align:left}
  .sched thead th{color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.07em; font-weight:800}
  .sched .time{white-space:nowrap; color:var(--muted); font-weight:700; width:92px}
  .sched tr.day td{background:var(--panel2); font-weight:800; font-size:12px; letter-spacing:.04em}
  .sched td.both{color:var(--muted)}
  .sched td.cls{font-weight:600}
  .sched td.exam{color:var(--hard); font-weight:700}
  .sched-notes{color:var(--faint); font-size:12px; margin-top:14px; display:flex; flex-direction:column; gap:5px}

  /* table */
  .tbl{width:100%; border-collapse:collapse; font-size:13px}
  .tbl th,.tbl td{text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top}
  .tbl th{color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:800}
  .tbl td:first-child{font-weight:700; white-space:nowrap}
  .tbl .w{color:var(--muted)}

  /* What's New + NEW 배지 */
  .newbadge{display:inline-block; font-size:9px; font-weight:800; letter-spacing:.05em; background:var(--accent); color:#14140d; padding:1px 5px; border-radius:5px; margin-left:6px; vertical-align:middle; position:relative; top:-1px}
  .wnew{display:flex; flex-direction:column; gap:0}
  .wnew .wrow{display:flex; gap:12px; align-items:baseline; padding:11px 0; border-bottom:1px solid var(--line)}
  .wnew .wrow:last-child{border-bottom:0}
  .wnew .wdate{font-family:var(--mono); font-size:11.5px; font-weight:800; color:var(--faint); min-width:42px; flex:0 0 auto}
  .wnew .wtext{font-size:14px; line-height:1.45}

  /* 업데이트 내역 모달 (대시보드 테마) */
  .histlink{cursor:pointer}
  .modal{position:fixed; inset:0; z-index:900; background:rgba(10,10,8,.55); display:flex; align-items:center; justify-content:center; padding:20px}
  .modal[hidden]{display:none}
  .modal-card{background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); width:100%; max-width:520px; max-height:82vh; display:flex; flex-direction:column; overflow:hidden}
  .modal-head{display:flex; align-items:center; justify-content:space-between; padding:17px 20px; border-bottom:1px solid var(--line)}
  .modal-head h3{font-family:var(--mono); margin:0; font-size:17px; font-weight:800}
  .modal-x{border:0; background:var(--panel2); color:var(--ink); width:30px; height:30px; border-radius:50%; font-size:13px; cursor:pointer; touch-action:manipulation}
  .modal-body{padding:6px 20px 20px; overflow-y:auto}
  .chlog{border-bottom:1px solid var(--line); padding:15px 0}
  .chlog:last-child{border-bottom:0}
  .chlog .cdate{font-family:var(--mono); font-weight:800; font-size:14px; margin-bottom:9px}
  .chlog ul{margin:0; padding-left:18px; display:flex; flex-direction:column; gap:6px}
  .chlog li{font-size:13.5px; color:var(--muted); line-height:1.45}

  /* story / 매거진 모드 */
  .iconbtn{border:1px solid var(--line); background:var(--panel); border-radius:999px; padding:8px 12px; font-size:15px; cursor:pointer; box-shadow:var(--shadow); touch-action:manipulation; -webkit-tap-highlight-color:transparent}
  .story{position:fixed; inset:0; height:100vh; height:100dvh; z-index:1000; background:#0a0a08; display:flex; flex-direction:column; overscroll-behavior:contain; user-select:none}
  .story[hidden]{display:none}
  .story-bars{position:absolute; top:0; left:0; right:0; display:flex; gap:4px; padding:11px 12px; z-index:5}
  .story-bars i{flex:1; height:3px; border-radius:2px; background:rgba(0,0,0,.22)}
  .story-bars i.on{background:rgba(0,0,0,.82)}
  .story-close{position:absolute; top:22px; right:14px; z-index:6; width:36px; height:36px; border:0; border-radius:50%; background:rgba(0,0,0,.3); color:#fff; font-size:15px; cursor:pointer}
  .story-track{flex:1; display:flex; transition:transform .32s cubic-bezier(.4,0,.2,1); will-change:transform}
  .slide{min-width:100%; height:100%; box-sizing:border-box; padding:62px 28px 76px; display:flex; flex-direction:column; overflow-y:auto; position:relative}
  .slide.lime{background:var(--grad); color:#14140d}
  .slide.paper{background:var(--panel); color:var(--ink)}
  .slide.mid{justify-content:center}
  .slide.fitslide{overflow:hidden; justify-content:flex-start; padding:54px 22px 26px}
  .slide .fit{width:100%; transform-origin:top center}
  .slide .kick{font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; opacity:.62; margin-bottom:14px}
  .slide .wm{font-family:Georgia,serif; font-size:22px; margin-bottom:18px}
  .slide .big{font-family:var(--mono); font-size:clamp(40px,13vw,76px); font-weight:800; letter-spacing:-.03em; line-height:1; margin:0}
  .slide .dnum{font-family:var(--mono); font-size:clamp(60px,22vw,120px); font-weight:800; letter-spacing:-.04em; line-height:.95}
  .slide h3{font-family:var(--mono); font-size:clamp(22px,5.5vw,32px); font-weight:800; letter-spacing:-.01em; line-height:1.15; margin:.3em 0 0}
  .slide .sub2{font-size:15px; opacity:.82; margin-top:8px; line-height:1.5}
  .slide ul{list-style:none; margin:16px 0 0; padding:0; display:flex; flex-direction:column; gap:13px}
  .slide li{font-size:15px; line-height:1.4}
  .slide .row2{display:flex; gap:12px; align-items:baseline; border-bottom:1px solid rgba(128,128,110,.18); padding-bottom:13px}
  .slide .dd2{font-family:var(--mono); font-weight:800; font-size:16px; min-width:50px; flex:0 0 auto}
  .slide .sbtn{align-self:flex-start; margin-top:20px; background:#14140d; color:#fff; font-weight:800; font-size:14px; padding:13px 22px; border-radius:999px; text-decoration:none}
  .slide .hint{position:absolute; bottom:26px; left:0; right:0; text-align:center; font-size:12px; opacity:.6}

  footer{margin-top:30px; color:var(--faint); font-size:12.5px; text-align:center; border-top:1px solid var(--line); padding-top:18px}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <!-- 공식 로고 이미지를 쓰려면 아래 <div class="wordmark">…</div> 를
           <img class="wmark-img" src="wharton-logo.png" alt="Wharton"> 로 교체하세요. -->
      <div class="wordmark">Wharton</div>
      <div class="kicker" id="kicker">Survival Dashboard</div>
      <h1 id="title">WEMBA 52</h1>
      <div class="asof" id="asof"></div>
    </div>
    <div class="controls">
      <button class="iconbtn" id="storyBtn" title="Story view">📖</button>
      <div class="toggle theme" role="group" aria-label="theme">
        <button data-theme="light" title="Light">☀️</button>
        <button data-theme="dark" title="Dark">🌙</button>
      </div>
      <div class="toggle lang" role="group" aria-label="language">
        <button data-lang="en">EN</button>
        <button data-lang="kr">한국어</button>
        <button data-lang="cn">中文</button>
      </div>
    </div>
  </header>

  <nav class="jump" id="jump"></nav>

  <div class="hero" id="hero" hidden>
    <div>
      <div class="label" data-t="nextDue"></div>
      <h2 id="heroTitle"></h2>
      <div class="meta" id="heroMeta"></div>
    </div>
    <div class="count">
      <div class="num" id="heroNum">–</div>
      <div class="unit" id="heroUnit"></div>
    </div>
  </div>

  <section id="sec-whatsnew">
    <div class="h"><h3 data-t="whatsNew"></h3><span class="hint" data-t="whatsNewHint"></span></div>
    <div class="card" id="whatsNew"></div>
  </section>

  <section id="sec-upcoming">
    <div class="h"><h3 data-t="upcoming"></h3><span class="hint" data-t="upcomingHint"></span></div>
    <div class="dl" id="deadlines"></div>
  </section>

  <section id="sec-schedule">
    <div class="h"><h3 data-t="schedule"></h3><span class="hint" id="schedHint"></span></div>
    <div class="card" id="schedule"></div>
  </section>

  <section id="sec-courses">
    <div class="h"><h3 data-t="courses"></h3></div>
    <div class="grid g2" id="courses"></div>
  </section>

  <section id="sec-canvas">
    <div class="h"><h3 data-t="canvas"></h3><span class="hint" data-t="canvasHint"></span></div>
    <div class="card" style="overflow-x:auto">
      <table class="tbl" id="canvas"></table>
    </div>
  </section>

  <section id="sec-actions">
    <div class="h"><h3 data-t="checklist"></h3><span class="hint" data-t="checklistHint"></span></div>
    <div class="card check">
      <div class="progress"><i id="progFill"></i></div>
      <div id="actions"></div>
    </div>
  </section>

  <section id="sec-social">

/* ---------- date helpers (PT = UTC-7 in summer) ---------- */
const PT_OFFSET = "-07:00";
function toDate(s){ // "YYYY-MM-DD" or "YYYY-MM-DDTHH:mm" -> Date (PT-anchored)
  const hasTime = s.includes("T");
  const iso = hasTime ? `${s}:00${PT_OFFSET}` : `${s}T23:59:00${PT_OFFSET}`;
  return { d:new Date(iso), allDay:!hasTime };
}
function startOfTodayPT(){
  const now = new Date();
  // current PT date string
  const ptNow = new Date(now.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
  ptNow.setHours(0,0,0,0);
  return ptNow;
}
function daysUntil(target){
  const today = startOfTodayPT();
  const t = new Date(target.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
  t.setHours(0,0,0,0);
  return Math.round((t - today)/86400000);
}
const MON = { kr:["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"],
              en:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
              cn:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"] };
const MON_FULL_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = { kr:["일","월","화","수","목","금","토"], en:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
              cn:["周日","周一","周二","周三","周四","周五","周六"] };
function ptOf(s){ const {d}=toDate(s); return new Date(d.toLocaleString("en-US",{timeZone:"America/Los_Angeles"})); }
function monthKey(s){ const pt=ptOf(s); return pt.getFullYear()*100+pt.getMonth(); }
function monthLabel(s){
  const pt=ptOf(s), y=pt.getFullYear(), m=pt.getMonth();
  if(lang==="en") return `${MON_FULL_EN[m]} ${y}`;
  if(lang==="cn") return `${y}年${m+1}月`;
  return `${y}년 ${m+1}월`;
}
function fmtUpdated(s){
  const pt = ptOf(s), y = pt.getFullYear(), m = pt.getMonth(), d = pt.getDate();
  if(lang==="en") return `${MON.en[m]} ${d}, ${y}`;
  if(lang==="cn") return `${y}年${m+1}月${d}日`;
  return `${y}. ${m+1}. ${d}.`;
}
function fmtWhen(item){
  const {d,allDay} = toDate(item.date);
  const pt = new Date(d.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
  const mo = MON[lang][pt.getMonth()], day = pt.getDate(), dow = DOW[lang][pt.getDay()];
  let s;
  if(lang==="kr") s = `${mo} ${day}일(${dow})`;
  else if(lang==="cn") s = `${mo}${day}日(${dow})`;
  else s = `${dow}, ${mo} ${day}`;
  if(!allDay){
    let h=pt.getHours(), m=pt.getMinutes(); const ap=h>=12?"PM":"AM"; h=h%12||12;
    s += ` · ${h}:${String(m).padStart(2,"0")} ${ap} PT`;
  }
  return s;
}

/* ---------- render ---------- */
function L(o){ return (o && (o[lang] ?? o.kr ?? o.en)) || ""; }

function render(){

  document.getElementById("asof").innerHTML = T.updated[lang] + " · " + fmtUpdated(DATA.meta.lastUpdated) + hist;
  const hl = document.getElementById("histOpen");
  if(hl) hl.addEventListener("click", e=>{ e.preventDefault(); openHistory(); });

  renderNav();

  const sorted = [...DATA.deadlines].sort((a,b)=> toDate(a.date).d - toDate(b.date).d);

  renderHero(sorted);
  renderWhatsNew();
  renderDeadlines(sorted);
  renderSchedule();
  renderSocial();
  renderCourses();
  renderActions();
  renderCanvas();

  document.getElementById("footer").innerHTML =
    `Wharton · WEMBA 52 Survival Dashboard · ${DATA.meta.author}`;
}

const NAV_ORDER = ["sec-whatsnew","sec-upcoming","sec-schedule","sec-canvas","sec-actions","sec-social"];
function renderNav(){
  const nav = document.getElementById("jump");
  nav.innerHTML = NAV_ORDER.filter(id=>{
    const el = document.getElementById(id);
    if(!el) return false;
    if(id==="sec-social" && (!DATA.social || !DATA.social.url)) return false;
    return true;
  }).map(id=>`<a href="#${id}">${T.nav[id][lang]}</a>`).join("");
}
let _spy = false;
function setupScrollSpy(){
  if(_spy || !("IntersectionObserver" in window)) return; _spy = true;
  const nav = document.getElementById("jump");
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(!en.isIntersecting) return;
      nav.querySelectorAll("a").forEach(a=>a.classList.remove("cur"));
      const link = nav.querySelector(`a[href="#${en.target.id}"]`);
      if(link){ link.classList.add("cur"); nav.scrollLeft = link.offsetLeft - 16; }
    });
  }, { rootMargin:"-72px 0px -65% 0px", threshold:0 });
  document.querySelectorAll("section[id]").forEach(s=>obs.observe(s));
}
function renderWhatsNew(){
  const sec = document.getElementById("sec-whatsnew");
  const list = DATA.whatsNew || [];
  if(!list.length){ sec.style.display = "none"; return; }
  sec.style.display = "";
  document.getElementById("whatsNew").innerHTML =
    `<div class="wnew">${list.map(it=>
      `<div class="wrow"><span class="wdate">${it.date?shortDate(it.date):""}</span><span class="wtext">${L(it)}</span></div>`
    ).join("")}</div>`;
}
function renderHero(sorted){
  const hero = document.getElementById("hero");
  const next = sorted.find(it => daysUntil(toDate(it.date).d) >= 0 && (it.hard || it.type==="registration" || it.type==="exam" || it.type==="paper")) || sorted.find(it=>daysUntil(toDate(it.date).d)>=0);
  if(!next){ hero.hidden = true; return; }
  hero.hidden = false;
  const n = daysUntil(toDate(next.date).d);
  hero.classList.toggle("urgent", n <= 2);   // D-2 이내면 빨강 강조
  document.getElementById("heroTitle").textContent = L(next.title);
  document.getElementById("heroMeta").textContent = fmtWhen(next) + (L(next.detail)? " · "+L(next.detail) : "");
  document.getElementById("heroNum").textContent = n===0 ? T.dday[lang] : "D-"+n;
  document.getElementById("heroUnit").textContent = n===0 ? "" : T.days[lang];
}

function renderDeadlines(sorted){
  const box = document.getElementById("deadlines"); box.innerHTML="";
  let curMonth = null;
  sorted.forEach(it=>{
    const n = daysUntil(toDate(it.date).d);
    if(n < 0) return;                          // 지난 일정은 표시 안 함
    // 월이 바뀌면 구분선 삽입
    const mk = monthKey(it.date);
    if(mk !== curMonth){
      curMonth = mk;
      const sep = document.createElement("div"); sep.className="month-sep";
      sep.textContent = monthLabel(it.date);
      box.appendChild(sep);
    }
    const pt = ptOf(it.date);
    const urgent = n<=2, soon = n<=7 && n>2;
    const row = document.createElement("div");
    row.className = "row";
    const ddText = n===0 ? T.today[lang] : "D-"+n;
    const dateBox = lang==="en" ? `${MON.en[pt.getMonth()]} ${pt.getDate()}` : `${pt.getMonth()+1}/${pt.getDate()}`;
    row.innerHTML = `
      <div class="dd ${urgent?'urgent':soon?'soon':''}">
        <div class="big">${dateBox}</div>
        <div class="sm">${ddText}</div>
      </div>
      <div class="body">
        <div class="ttl">${L(it.title)} <span class="tag" style="background:${TYPE_COLOR[it.type]}">${T.typeNames[it.type][lang]}</span>${it.new?`<span class="newbadge">${T.newBadge[lang]}</span>`:""}</div>
        ${L(it.detail)?`<div class="det">${L(it.detail)}</div>`:""}
        <div class="when">${fmtWhen(it)} · ${it.course}</div>
      </div>
      ${it.hard?`<div class="pill" style="background:color-mix(in srgb,var(--hard) 18%,transparent); color:var(--hard)">${T.hard[lang]}</div>`:""}
    `;
    box.appendChild(row);
  });
}

function renderSchedule(){
  const s = DATA.schedule;
  if(!s){ document.getElementById("schedule").innerHTML=""; return; }
  document.getElementById("schedHint").textContent = L(s.weekend);
  let html = `<div style="overflow-x:auto"><table class="sched">`+
    `<thead><tr><th></th><th>${T.sec1[lang]}</th><th>${T.sec2[lang]}</th></tr></thead><tbody>`;
  s.days.forEach(day=>{
    html += `<tr class="day"><td colspan="3">${L(day.label)}</td></tr>`;
    day.rows.forEach(r=>{
      if(r.both){
        const isExam = /Midterm|중간|期中/.test(L(r.both));
        html += `<tr><td class="time">${r.time}</td><td class="both ${isExam?'exam':''}" colspan="2">${L(r.both)}</td></tr>`;
      } else {
        html += `<tr><td class="time">${r.time}</td><td class="cls">${L(r.s1)}</td><td class="cls">${L(r.s2)}</td></tr>`;
      }
    });
  });
  html += `</tbody></table></div>`;
  if(s.notes && s.notes.length)
    html += `<div class="sched-notes">${s.notes.map(n=>`<span>${L(n)}</span>`).join("")}</div>`;
  document.getElementById("schedule").innerHTML = html;
}

function renderCourses(){
  const box = document.getElementById("courses"); box.innerHTML="";
  DATA.courses.forEach(c=>{
    const el = document.createElement("div"); el.className="card course";
    const nb = o => o.new ? `<span class="newbadge">${T.newBadge[lang]}</span>` : "";
    const pts = c.points.map(p=>`<li>${L(p)}${nb(p)}</li>`).join("");
    const traps = c.traps.length ? `<div class="traps"><div class="lab">${T.traps[lang]}</div><ul>${c.traps.map(t=>`<li>${L(t)}${nb(t)}</li>`).join("")}</ul></div>` : "";
    el.innerHTML = `
      <div class="top"><span class="dot" style="background:${c.color}"></span>
        <span class="code" style="color:${c.color}">${c.code}</span>
        <span class="nm">${L(c.name)}</span></div>
      <div class="head">${L(c.headline)}</div>
      <ul>${pts}</ul>${traps}`;
    box.appendChild(el);
  });
}

function shortDate(s){
  const pt=ptOf(s);
  return lang==="en" ? `${MON.en[pt.getMonth()]} ${pt.getDate()}` : `${pt.getMonth()+1}/${pt.getDate()}`;
}
function byLabel(s){
  if(lang==="kr") return `${shortDate(s)} 까지`;
  if(lang==="cn") return `${shortDate(s)} 前`;
  return `by ${shortDate(s)}`;
}
function renderActions(){
  const box = document.getElementById("actions"); box.innerHTML="";
  const saved = JSON.parse(localStorage.getItem("wemba_actions")||"{}");
  DATA.actions.forEach(a=>{
    const done = !!saved[a.id];
    const overdue = !done && daysUntil(toDate(a.by).d) < 0;
    const row = document.createElement("button");
    row.type = "button";
    row.className = "srow"+(done?" done":overdue?" over":"");
    const stat = done ? T.stDone[lang]
               : overdue ? `${T.stOver[lang]} · ${shortDate(a.by)}`
               : byLabel(a.by);
    const icon = done ? "✓" : overdue ? "✕" : "";
    row.innerHTML = `<div class="stext"><div class="stitle">${L(a.label)}</div><div class="sstat">${stat}</div></div>`+
      `<span class="scircle">${icon}</span>`;
    row.addEventListener("click", ()=>{
      const s = JSON.parse(localStorage.getItem("wemba_actions")||"{}");
      s[a.id] = !s[a.id]; localStorage.setItem("wemba_actions", JSON.stringify(s));
      renderActions();
    });
    box.appendChild(row);
  });
  updateProgress();
}
function updateProgress(){
  const saved = JSON.parse(localStorage.getItem("wemba_actions")||"{}");
  const total = DATA.actions.length;
  const done = DATA.actions.filter(a=>saved[a.id]).length;
  document.getElementById("progFill").style.width = (total? done/total*100:0)+"%";
}

function buildStory(){
  const slides = [];
  const nbS = o => o && o.new ? `<span class="newbadge">${T.newBadge[lang]}</span>` : "";
  const sorted = [...DATA.deadlines].sort((a,b)=> toDate(a.date).d - toDate(b.date).d);

  // 표지
  slides.push(`<div class="slide lime mid"><div class="wm">Wharton</div>`+
    `<div class="kick">Survival Dashboard</div><div class="big">WEMBA 52</div>`+
    `<div class="sub2">${T.updated[lang]} · ${fmtUpdated(DATA.meta.lastUpdated)}</div>`+
    `<div class="hint">${T.storyHint[lang]}</div></div>`);

  // 다음 마감
  const next = sorted.find(it=> daysUntil(toDate(it.date).d) >= 0);
  if(next){ const n = daysUntil(toDate(next.date).d);
    slides.push(`<div class="slide lime mid"><div class="kick">${T.nextDue[lang]}</div>`+
      `<div class="dnum">${n===0?T.dday[lang]:'D-'+n}</div>`+
      `<h3>${L(next.title)}</h3><div class="sub2">${fmtWhen(next)}</div></div>`);
  }

  // 다가오는 일정
  const up = sorted.filter(it=> daysUntil(toDate(it.date).d) >= 0).slice(0,6);
  if(up.length) slides.push(`<div class="slide paper"><div class="kick">${T.upcoming[lang]}</div><ul>`+
    up.map(it=>{ const n=daysUntil(toDate(it.date).d);
      return `<li class="row2"><span class="dd2">${n===0?T.today[lang]:'D-'+n}</span>`+
        `<span>${L(it.title)}${nbS(it)}<br><span style="opacity:.6;font-size:13px">${fmtWhen(it)}</span></span></li>`;
    }).join("")+`</ul></div>`);

  // 수업 일정표 (한 화면에 맞게 자동 축소)
  if(DATA.schedule){ const s = DATA.schedule; let rows="";
    s.days.forEach(d=>{ rows += `<li style="font-weight:800;opacity:.55;border:0;padding-top:6px">${L(d.label)}</li>`;
      d.rows.forEach(r=>{ rows += `<li class="row2"><span class="dd2" style="font-size:12px">${r.time}</span>`+
        `<span>${r.both?L(r.both):L(r.s1)+' / '+L(r.s2)}</span></li>`; }); });
    slides.push(`<div class="slide paper fitslide"><div class="fit"><div class="kick">${T.schedule[lang]} · ${L(s.weekend)}</div><ul>${rows}</ul></div></div>`);
  }

  // 과목별 (tip/핵심 모두 포함, 길면 자동 축소)
  DATA.courses.forEach(c=>{
    const pts = c.points.map(p=>`<li>• ${L(p)}${nbS(p)}</li>`).join("");
    const traps = c.traps.length
      ? `<li style="margin-top:8px;font-weight:800;color:${c.color};border:0;padding:0">${T.traps[lang]}</li>`+
        c.traps.map(t=>`<li>⚠ ${L(t)}${nbS(t)}</li>`).join("")
      : "";
    slides.push(`<div class="slide paper fitslide"><div class="fit"><div class="kick" style="color:${c.color};opacity:1">${c.code} · ${L(c.name)}</div>`+
      `<h3>${L(c.headline)}</h3><ul>${pts}${traps}</ul></div></div>`);
  });

  // 할 일 (길면 자동 축소)
  const saved = JSON.parse(localStorage.getItem("wemba_actions")||"{}");
  slides.push(`<div class="slide paper fitslide"><div class="fit"><div class="kick">${T.checklist[lang]}</div><ul>`+
    DATA.actions.map(a=>{ const done=!!saved[a.id], over=!done && daysUntil(toDate(a.by).d)<0;
      return `<li>${done?'✅':over?'🔴':'⚪'} ${L(a.label)}</li>`; }).join("")+`</ul></div></div>`);

  // 디너
  if(DATA.social && DATA.social.url){
    slides.push(`<div class="slide lime"><div class="kick">${T.social[lang]}</div>`+
      `<h3>${L(DATA.social.cta)}</h3><div class="sub2">${L(DATA.social.desc)}</div>`+
      `<a class="sbtn" href="${DATA.social.embedUrl||DATA.social.url}" target="_blank" rel="noopener noreferrer">${L(DATA.social.cta)} ↗</a></div>`);
  }

  // 마무리
  slides.push(`<div class="slide lime mid"><div class="big" style="font-size:clamp(30px,9vw,52px)">${T.storyEnd[lang]}</div>`+
    `<div class="hint">${T.storyCloseHint[lang]}</div></div>`);

  document.getElementById("storyTrack").innerHTML = slides.join("");
  document.getElementById("storyBars").innerHTML = slides.map(()=>`<i></i>`).join("");
  storySlides = slides.length; storyIndex = 0; applyStory();
}
function applyStory(){
  document.getElementById("storyTrack").style.transform = `translateX(${-storyIndex*100}%)`;
  document.querySelectorAll("#storyBars i").forEach((b,i)=> b.classList.toggle("on", i<=storyIndex));
}
function storyGo(i){ if(i<0){ storyIndex=0; applyStory(); return; } if(i>=storySlides){ closeStory(); return; } storyIndex=i; applyStory(); fitSlides(); }
function fitSlides(){
  const vh = window.innerHeight;   // 모바일 실제 보이는 높이 (주소창 반영)
  document.querySelectorAll("#storyTrack .fitslide").forEach(slide=>{
    const fit = slide.querySelector(".fit"); if(!fit) return;
    fit.style.transform = "";
    const cs = getComputedStyle(slide);
    const avail = vh - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
    const need = fit.scrollHeight;
    if(need > avail + 1){ fit.style.transform = `scale(${Math.max(0.4, avail/need)})`; }
  });
}
function openStory(){
  buildStory();
  document.getElementById("story").hidden=false; document.body.style.overflow="hidden";
  requestAnimationFrame(()=>requestAnimationFrame(fitSlides));
  setTimeout(fitSlides, 300);   // 모바일 주소창 높이 변화 후 재조정
}
function closeStory(){ document.getElementById("story").hidden=true; document.body.style.overflow=""; }

document.getElementById("storyBtn").addEventListener("click", openStory);
document.getElementById("storyClose").addEventListener("click", closeStory);
(function(){
  const story = document.getElementById("story");
  let sx=0, sy=0, usedTouch=false;
  story.addEventListener("touchstart", e=>{ usedTouch=true; const t=e.touches[0]; sx=t.clientX; sy=t.clientY; }, {passive:true});
  story.addEventListener("touchend", e=>{
    const t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){ storyGo(storyIndex + (dx<0?1:-1)); return; }
    if(Math.abs(dx)<10 && Math.abs(dy)<10){
      if(e.target.closest("a,button,.story-bars")) return;
      storyGo(t.clientX > window.innerWidth*0.5 ? storyIndex+1 : storyIndex-1);
    }
  }, {passive:true});
  story.addEventListener("click", e=>{
    if(usedTouch){ usedTouch=false; return; }
    if(e.target.closest("a,button,.story-bars")) return;
    storyGo(e.clientX > window.innerWidth*0.5 ? storyIndex+1 : storyIndex-1);
  });
  document.addEventListener("keydown", e=>{
    if(document.getElementById("story").hidden) return;
    if(e.key==="ArrowRight") storyGo(storyIndex+1);
    else if(e.key==="ArrowLeft") storyGo(storyIndex-1);
    else if(e.key==="Escape") closeStory();
  });
  window.addEventListener("resize", ()=>{ if(!document.getElementById("story").hidden) fitSlides(); });
})();

applyTheme();
render();
setupScrollSpy();

/* 방문 수 집계 (GoatCounter) — 로컬(file://)에선 생략, 실제 사이트(http/https)에서만 */
if(location.protocol === "https:" || location.protocol === "http:"){
  const gc = document.createElement("script");
  gc.async = true;
  gc.setAttribute("data-goatcounter", "https://wemba52sf.goatcounter.com/count");
  gc.src = "https://gc.zgo.at/count.js";
  document.body.appendChild(gc);
}
</script>
